<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이트 신청 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .question {
            font-size: 1.5em;
            margin-bottom: 40px;
            color: #333;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
            height: 150px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .no-btn {
            background: #e0e0e0;
            color: #666;
            position: absolute;
            transition: all 0.05s ease-out;
        }

        .calendar-container, .food-container, .place-container, .final-container {
            display: none;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin: 30px 0;
        }

        .calendar-header {
            font-weight: bold;
            color: #667eea;
            padding: 10px;
        }

        .calendar-day {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .calendar-day:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
        }

        .time-selector {
            margin: 30px 0;
        }

        .time-selector select {
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin: 0 10px;
            cursor: pointer;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .option-card {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-5px);
        }

        .option-card.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 30px;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }

        .final-message {
            font-size: 1.3em;
            line-height: 1.8;
            color: #333;
        }

        .heart {
            color: #e74c3c;
            font-size: 3em;
            margin: 20px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 첫 번째 페이지: 데이트 신청 -->
        <div class="initial-container">
            <h1>💕 데이트 신청 💕</h1>
            <p class="question">나랑 데이트 할래? 🥺</p>
            <div class="button-container">
                <button class="yes-btn" onclick="acceptDate()">네! 좋아요 💖</button>
                <button class="no-btn" id="noBtn">아니요...</button>
            </div>
        </div>

        <!-- 두 번째 페이지: 날짜 및 시간 선택 -->
        <div class="calendar-container">
            <h1>📅 언제 만날까?</h1>
            <p class="question">날짜를 선택해주세요!</p>
            <div class="calendar" id="calendar"></div>
            <div class="time-selector">
                <label>시간: </label>
                <select id="hour">
                    <option value="">시</option>
                </select>
                <select id="minute">
                    <option value="">분</option>
                </select>
            </div>
            <button class="next-btn" onclick="nextToFood()">다음 →</button>
        </div>

        <!-- 세 번째 페이지: 음식 선택 -->
        <div class="food-container">
            <h1>🍽️ 뭐 먹을까?</h1>
            <p class="question">먹고 싶은 음식을 선택해주세요!</p>
            <div class="options" id="foodOptions"></div>
            <button class="next-btn" onclick="nextToPlace()">다음 →</button>
        </div>

        <!-- 네 번째 페이지: 장소 선택 -->
        <div class="place-container">
            <h1>🎯 어디 갈까?</h1>
            <p class="question">가고 싶은 장소를 선택해주세요!</p>
            <div class="options" id="placeOptions"></div>
            <button class="next-btn" onclick="showFinal()">완료! 💕</button>
        </div>

        <!-- 마지막 페이지: 완료 -->
        <div class="final-container">
            <div class="heart">💖</div>
            <h1>완벽해요! 🎉</h1>
            <div class="final-message" id="finalMessage"></div>
            <div class="heart">💕</div>
        </div>
    </div>

    <script>
        let selectedDate = null;
        let selectedTime = { hour: null, minute: null };
        let selectedFood = null;
        let selectedPlace = null;

        // 거절 버튼 자석처럼 밀려나기
        const noBtn = document.getElementById('noBtn');
        const container = document.querySelector('.button-container');
        
        let noBtnX = 0;
        let noBtnY = 0;

        // 초기 위치 설정
        function initNoBtnPosition() {
            const containerRect = container.getBoundingClientRect();
            noBtnX = containerRect.width / 2 + 80;
            noBtnY = containerRect.height / 2 - 25;
            noBtn.style.left = noBtnX + 'px';
            noBtn.style.top = noBtnY + 'px';
        }

        initNoBtnPosition();

        // 마우스 움직임 감지
        container.addEventListener('mousemove', (e) => {
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            // 마우스 위치 (컨테이너 기준)
            const mouseX = e.clientX - containerRect.left;
            const mouseY = e.clientY - containerRect.top;
            
            // 버튼 중심 위치
            const btnCenterX = noBtnX + btnRect.width / 2;
            const btnCenterY = noBtnY + btnRect.height / 2;
            
            // 마우스와 버튼 사이의 거리
            const deltaX = btnCenterX - mouseX;
            const deltaY = btnCenterY - mouseY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            // 반발 거리 (이 거리 안에 들어오면 밀려남)
            const repelDistance = 150;
            
            if (distance < repelDistance) {
                // 반발 강도 계산 (가까울수록 강하게)
                const repelStrength = (repelDistance - distance) / repelDistance;
                const pushDistance = 100 * repelStrength;
                
                // 밀려날 방향 계산
                const angle = Math.atan2(deltaY, deltaX);
                const pushX = Math.cos(angle) * pushDistance;
                const pushY = Math.sin(angle) * pushDistance;
                
                // 새 위치 계산
                let newX = noBtnX + pushX;
                let newY = noBtnY + pushY;
                
                // 경계 체크
                const maxX = containerRect.width - btnRect.width;
                const maxY = containerRect.height - btnRect.height;
                
                newX = Math.max(0, Math.min(newX, maxX));
                newY = Math.max(0, Math.min(newY, maxY));
                
                // 위치 업데이트
                noBtnX = newX;
                noBtnY = newY;
                
                noBtn.style.left = noBtnX + 'px';
                noBtn.style.top = noBtnY + 'px';
            }
        });

        // 데이트 수락
        function acceptDate() {
            document.querySelector('.initial-container').style.display = 'none';
            document.querySelector('.calendar-container').style.display = 'block';
            generateCalendar();
            generateTimeOptions();
        }

        // 달력 생성
        function generateCalendar() {
            const calendar = document.getElementById('calendar');
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            // 요일 헤더
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.textContent = day;
                calendar.appendChild(header);
            });

            // 다음 30일 생성
            const today = new Date();
            for (let i = 0; i < 30; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                dayElement.textContent = date.getDate();
                dayElement.dataset.date = date.toISOString().split('T')[0];
                
                dayElement.addEventListener('click', function() {
                    document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedDate = this.dataset.date;
                });
                
                calendar.appendChild(dayElement);
            }
        }

        // 시간 옵션 생성
        function generateTimeOptions() {
            const hourSelect = document.getElementById('hour');
            const minuteSelect = document.getElementById('minute');

            for (let i = 0; i < 24; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + '시';
                hourSelect.appendChild(option);
            }

            for (let i = 0; i < 60; i += 10) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + '분';
                minuteSelect.appendChild(option);
            }

            hourSelect.addEventListener('change', (e) => selectedTime.hour = e.target.value);
            minuteSelect.addEventListener('change', (e) => selectedTime.minute = e.target.value);
        }

        // 음식 페이지로
        function nextToFood() {
            if (!selectedDate || !selectedTime.hour || !selectedTime.minute) {
                alert('날짜와 시간을 모두 선택해주세요! 😊');
                return;
            }

            document.querySelector('.calendar-container').style.display = 'none';
            document.querySelector('.food-container').style.display = 'block';
            
            const foods = [
                { emoji: '🍕', name: '피자' },
                { emoji: '🍣', name: '초밥' },
                { emoji: '🍝', name: '파스타' },
                { emoji: '🍔', name: '햄버거' },
                { emoji: '🍜', name: '라멘' },
                { emoji: '🥘', name: '한식' },
                { emoji: '🌮', name: '멕시칸' },
                { emoji: '🍱', name: '도시락' }
            ];

            const foodOptions = document.getElementById('foodOptions');
            foods.forEach(food => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="emoji">${food.emoji}</div><div>${food.name}</div>`;
                card.addEventListener('click', function() {
                    document.querySelectorAll('#foodOptions .option-card').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedFood = food.name;
                });
                foodOptions.appendChild(card);
            });
        }

        // 장소 페이지로
        function nextToPlace() {
            if (!selectedFood) {
                alert('음식을 선택해주세요! 😊');
                return;
            }

            document.querySelector('.food-container').style.display = 'none';
            document.querySelector('.place-container').style.display = 'block';
            
            const places = [
                { emoji: '🎬', name: '영화관' },
                { emoji: '🎨', name: '미술관' },
                { emoji: '🌳', name: '공원' },
                { emoji: '🎡', name: '놀이공원' },
                { emoji: '🏖️', name: '바다' },
                { emoji: '⛰️', name: '산' },
                { emoji: '🎮', name: '오락실' },
                { emoji: '☕', name: '카페' }
            ];

            const placeOptions = document.getElementById('placeOptions');
            places.forEach(place => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="emoji">${place.emoji}</div><div>${place.name}</div>`;
                card.addEventListener('click', function() {
                    document.querySelectorAll('#placeOptions .option-card').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedPlace = place.name;
                });
                placeOptions.appendChild(card);
            });
        }

        // 최종 페이지
        function showFinal() {
            if (!selectedPlace) {
                alert('장소를 선택해주세요! 😊');
                return;
            }

            document.querySelector('.place-container').style.display = 'none';
            document.querySelector('.final-container').style.display = 'block';

            const date = new Date(selectedDate);
            const dateStr = `${date.getMonth() + 1}월 ${date.getDate()}일`;
            
            const finalMessage = document.getElementById('finalMessage');
            finalMessage.innerHTML = `
                <p><strong>${dateStr} ${selectedTime.hour}시 ${selectedTime.minute}분</strong>에</p>
                <p><strong>${selectedFood}</strong> 먹고</p>
                <p><strong>${selectedPlace}</strong> 가기로 했어요!</p>
                <br>
                <p>약속 꼭 지켜야 해요! 😊</p>
                <p>정말 기대돼요! 💕</p>
            `;
        }
    </script>
</body>
</html>
