<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이트 신청 💕</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .question {
            font-size: 1.5em;
            margin-bottom: 40px;
            color: #333;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
            height: 150px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .no-btn {
            background: #e0e0e0;
            color: #666;
            position: absolute;
            transition: all 0.05s ease-out;
        }

        .calendar-container, .food-container, .place-container, .final-container {
            display: none;
        }

        .date-time-selector {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .input-group label {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            text-align: left;
        }

        input[type="date"],
        input[type="time"] {
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="date"]:hover,
        input[type="time"]:hover {
            border-color: #764ba2;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        input[type="date"]:focus,
        input[type="time"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(37%) sepia(93%) saturate(1352%) hue-rotate(223deg) brightness(94%) contrast(88%);
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .option-card {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-5px);
        }

        .option-card.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 30px;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .final-message {
            font-size: 1.3em;
            line-height: 1.8;
            color: #333;
        }

        .heart {
            color: #e74c3c;
            font-size: 3em;
            margin: 20px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .custom-alert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .alert-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .alert-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .alert-title {
            font-size: 1.8em;
            color: #e74c3c;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .alert-message {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .alert-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .alert-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            display: none;
            color: #27ae60;
            font-size: 1.1em;
            margin-top: 15px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .question {
                font-size: 1.2em;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .alert-box {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 첫 번째 페이지: 데이트 신청 -->
        <div class="initial-container">
            <h1>💕 데이트 신청 💕</h1>
            <p class="question">나랑 데이트 할래? 🥺</p>
            <div class="button-container">
                <button class="yes-btn" onclick="acceptDate()">네! 좋아요 💖</button>
                <button class="no-btn" id="noBtn">아니요...</button>
            </div>
        </div>

        <!-- 두 번째 페이지: 날짜 및 시간 선택 -->
        <div class="calendar-container">
            <h1>📅 언제 만날까?</h1>
            <p class="question">날짜와 시간을 선택해주세요!</p>
            
            <div class="date-time-selector">
                <div class="input-group">
                    <label for="dateInput">📅 날짜</label>
                    <input type="date" id="dateInput" required>
                </div>
                
                <div class="input-group">
                    <label for="timeInput">🕐 시간</label>
                    <input type="time" id="timeInput" required>
                </div>
            </div>
            
            <button class="next-btn" onclick="nextToFood()">다음 →</button>
        </div>

        <!-- 세 번째 페이지: 음식 선택 -->
        <div class="food-container">
            <h1>🍽️ 뭐 먹을까?</h1>
            <p class="question">먹고 싶은 음식을 선택해주세요!</p>
            <div class="options" id="foodOptions"></div>
            <button class="next-btn" onclick="nextToPlace()">다음 →</button>
        </div>

        <!-- 네 번째 페이지: 장소 선택 -->
        <div class="place-container">
            <h1>🎯 어디 갈까?</h1>
            <p class="question">가고 싶은 장소를 선택해주세요!</p>
            <div class="options" id="placeOptions"></div>
            <button class="next-btn" onclick="showFinal()">완료! 💕</button>
        </div>

        <!-- 마지막 페이지: 완료 -->
        <div class="final-container">
            <div class="heart">💖</div>
            <h1>완벽해요! 🎉</h1>
            <div class="final-message" id="finalMessage"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">전송 중...</p>
            </div>
            <div class="success-message" id="successMessage">✅ 전송 완료!</div>
            <div class="heart">💕</div>
        </div>
    </div>

    <!-- 커스텀 알림창 -->
    <div class="custom-alert" id="customAlert">
        <div class="alert-box">
            <div class="alert-icon">⚠️</div>
            <div class="alert-title">그 답변은 옳지 않습니다!</div>
            <div class="alert-message" id="alertMessage">다시 생각해보세요 🥺</div>
            <button class="alert-btn" onclick="closeAlert()">알겠어요...</button>
        </div>
    </div>

    <script>
        // Discord Webhook URL
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1516038355735806112/yf2b3e9ZKxsrOUZb4WxMLS_MJNd4ZACiLzZGkhoTAcEewkVuNpy3kPix1-U4mVV7Yyp-';

        let selectedDate = null;
        let selectedTime = null;
        let selectedFood = null;
        let selectedPlace = null;
        let noClickCount = 0;

        const noMessages = [
            "그 답변은 옳지 않습니다! 🙅‍♀️",
            "다시 한번 생각해보세요! 🤔",
            "정말로 거절하시겠어요? 🥺",
            "제발요... 한 번만 기회를 주세요! 🙏",
            "이건 아니잖아요! 😢",
            "마음을 바꿔주세요! 💔",
            "거절은 받지 않습니다! 😤",
            "YES만 가능합니다! ✨"
        ];

        const noBtn = document.getElementById('noBtn');
        const container = document.querySelector('.button-container');
        
        let noBtnX = 0;
        let noBtnY = 0;

        function initNoBtnPosition() {
            const containerRect = container.getBoundingClientRect();
            noBtnX = containerRect.width / 2 + 80;
            noBtnY = containerRect.height / 2 - 25;
            noBtn.style.left = noBtnX + 'px';
            noBtn.style.top = noBtnY + 'px';
        }

        initNoBtnPosition();

        container.addEventListener('mousemove', (e) => {
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            const mouseX = e.clientX - containerRect.left;
            const mouseY = e.clientY - containerRect.top;
            
            const btnCenterX = noBtnX + btnRect.width / 2;
            const btnCenterY = noBtnY + btnRect.height / 2;
            
            const deltaX = btnCenterX - mouseX;
            const deltaY = btnCenterY - mouseY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            const repelDistance = 150;
            
            if (distance < repelDistance) {
                const repelStrength = (repelDistance - distance) / repelDistance;
                const pushDistance = 100 * repelStrength;
                
                const angle = Math.atan2(deltaY, deltaX);
                const pushX = Math.cos(angle) * pushDistance;
                const pushY = Math.sin(angle) * pushDistance;
                
                let newX = noBtnX + pushX;
                let newY = noBtnY + pushY;
                
                const maxX = containerRect.width - btnRect.width;
                const maxY = containerRect.height - btnRect.height;
                
                newX = Math.max(0, Math.min(newX, maxX));
                newY = Math.max(0, Math.min(newY, maxY));
                
                noBtnX = newX;
                noBtnY = newY;
                
                noBtn.style.left = noBtnX + 'px';
                noBtn.style.top = noBtnY + 'px';
            }
        });

        noBtn.addEventListener('click', () => {
            showAlert();
        });

        function showAlert() {
            const alertBox = document.getElementById('customAlert');
            const alertMessage = document.getElementById('alertMessage');
            
            const message = noMessages[noClickCount % noMessages.length];
            alertMessage.textContent = message;
            
            alertBox.style.display = 'flex';
            noClickCount++;
        }

        function closeAlert() {
            const alertBox = document.getElementById('customAlert');
            alertBox.style.display = 'none';
        }

        const dateInput = document.getElementById('dateInput');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;

        function acceptDate() {
            document.querySelector('.initial-container').style.display = 'none';
            document.querySelector('.calendar-container').style.display = 'block';
        }

        function nextToFood() {
            selectedDate = document.getElementById('dateInput').value;
            selectedTime = document.getElementById('timeInput').value;

            if (!selectedDate || !selectedTime) {
                alert('날짜와 시간을 모두 선택해주세요! 😊');
                return;
            }

            document.querySelector('.calendar-container').style.display = 'none';
            document.querySelector('.food-container').style.display = 'block';
            
            const foods = [
                { emoji: '🍕', name: '피자' },
                { emoji: '🍣', name: '초밥' },
                { emoji: '🍝', name: '파스타' },
                { emoji: '🍔', name: '햄버거' },
                { emoji: '🍜', name: '라멘' },
                { emoji: '🥘', name: '한식' },
                { emoji: '🌮', name: '멕시칸' },
                { emoji: '🍱', name: '도시락' }
            ];

            const foodOptions = document.getElementById('foodOptions');
            foodOptions.innerHTML = '';
            
            foods.forEach(food => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="emoji">${food.emoji}</div><div>${food.name}</div>`;
                card.addEventListener('click', function() {
                    document.querySelectorAll('#foodOptions .option-card').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedFood = food.name;
                });
                foodOptions.appendChild(card);
            });
        }

        function nextToPlace() {
            if (!selectedFood) {
                alert('음식을 선택해주세요! 😊');
                return;
            }

            document.querySelector('.food-container').style.display = 'none';
            document.querySelector('.place-container').style.display = 'block';
            
            const places = [
                { emoji: '🎬', name: '영화관' },
                { emoji: '🎨', name: '미술관' },
                { emoji: '🌳', name: '공원' },
                { emoji: '🎡', name: '놀이공원' },
                { emoji: '🏖️', name: '바다' },
                { emoji: '⛰️', name: '산' },
                { emoji: '🎮', name: '오락실' },
                { emoji: '☕', name: '카페' }
            ];

            const placeOptions = document.getElementById('placeOptions');
            placeOptions.innerHTML = '';
            
            places.forEach(place => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="emoji">${place.emoji}</div><div>${place.name}</div>`;
                card.addEventListener('click', function() {
                    document.querySelectorAll('#placeOptions .option-card').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedPlace = place.name;
                });
                placeOptions.appendChild(card);
            });
        }

        function showFinal() {
            if (!selectedPlace) {
                alert('장소를 선택해주세요! 😊');
                return;
            }

            document.querySelector('.place-container').style.display = 'none';
            document.querySelector('.final-container').style.display = 'block';

            const date = new Date(selectedDate);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = weekdays[date.getDay()];
            
            const [hour, minute] = selectedTime.split(':');
            const hourNum = parseInt(hour);
            const period = hourNum >= 12 ? '오후' : '오전';
            const displayHour = hourNum > 12 ? hourNum - 12 : (hourNum === 0 ? 12 : hourNum);
            
            const finalMessage = document.getElementById('finalMessage');
            finalMessage.innerHTML = `
                <p><strong>${year}년 ${month}월 ${day}일 (${weekday})</strong></p>
                <p><strong>${period} ${displayHour}시 ${minute}분</strong>에</p>
                <br>
                <p><strong>${selectedFood}</strong> 먹고</p>
                <p><strong>${selectedPlace}</strong> 가기로 했어요!</p>
                <br>
                <p>약속 꼭 지켜야 해요! 😊</p>
                <p>정말 기대돼요! 💕</p>
            `;

            // Discord로 전송
            sendToDiscord(year, month, day, weekday, period, displayHour, minute);
        }

        async function sendToDiscord(year, month, day, weekday, period, displayHour, minute) {
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            
            loading.style.display = 'block';
            successMessage.style.display = 'none';

            const message = {
                content: "@everyone 💕 데이트 신청 응답이 도착했어요!",
                embeds: [{
                    title: "💕 데이트 신청 응답",
                    description: "상대방이 데이트를 수락했어요! 🎉",
                    color: 6750207, // 보라색
                    fields: [
                        {
                            name: "📅 날짜",
                            value: `${year}년 ${month}월 ${day}일 (${weekday})`,
                            inline: false
                        },
                        {
                            name: "🕐 시간",
                            value: `${period} ${displayHour}시 ${minute}분`,
                            inline: false
                        },
                        {
                            name: "🍽️ 음식",
                            value: selectedFood,
                            inline: true
                        },
                        {
                            name: "🎯 장소",
                            value: selectedPlace,
                            inline: true
                        }
                    ],
                    footer: {
                        text: "기대되네요! 😊"
                    },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(message)
                });

                if (response.ok) {
                    console.log('Discord 전송 성공!');
                    loading.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    console.error('Discord 전송 실패:', response.status);
                    loading.style.display = 'none';
                    alert('전송에 실패했습니다. 다시 시도해주세요.');
                }
            } catch (error) {
                console.error('전송 오류:', error);
                loading.style.display = 'none';
                alert('전송 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
